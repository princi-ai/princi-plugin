name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  json:
    name: validate-json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate JSON files
        run: |
          set -e
          for f in $(find . -name "*.json" -not -path "./node_modules/*"); do
            echo "Validating $f"
            python3 -m json.tool "$f" > /dev/null
          done

      - name: Verify plugin logos exist
        run: |
          set -e
          for f in \
            .claude-plugin/plugin.json \
            .claude-plugin/marketplace.json \
            .cursor-plugin/plugin.json \
            .cursor-plugin/marketplace.json; do
            logo=$(python3 -c "import json; d=json.load(open('$f')); print(d.get('logo') or d['plugins'][0]['logo'])")
            if [ ! -f "$logo" ]; then
              echo "::error file=$f::logo path missing: $logo"
              exit 1
            fi
            echo "$f -> $logo"
          done
