name: Auto Release

# When .claude-plugin/plugin.json changes on main and its version has no
# matching v<version> tag yet, this workflow tags the commit, builds the
# .mcpb + tarball artifacts, and publishes a GitHub Release.
#
# Note: we build the release inline (rather than just pushing a tag and
# letting release.yml fire) because tags pushed via GITHUB_TOKEN do not
# trigger downstream workflow runs.

on:
  push:
    branches: [main]
    paths:
      - '.claude-plugin/plugin.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Read version from plugin.json
        id: version
        run: |
          set -e
          VERSION=$(python3 -c 'import json; print(json.load(open(".claude-plugin/plugin.json"))["version"])')
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read version from .claude-plugin/plugin.json"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION"    >> "$GITHUB_OUTPUT"
          echo "name=princi-$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Verify all manifest versions match plugin.json
        env:
          EXPECTED: ${{ steps.version.outputs.version }}
        run: |
          set -e
          mismatch=0
          for f in \
            .claude-plugin/marketplace.json \
            .cursor-plugin/plugin.json \
            .cursor-plugin/marketplace.json \
            .codex-plugin/plugin.json \
            desktop/manifest.json; do
            v=$(python3 -c "import json,sys; d=json.load(open('$f')); print(d.get('version') or d['plugins'][0]['version'])")
            if [ "$v" != "$EXPECTED" ]; then
              echo "::error file=$f::version $v does not match plugin.json ($EXPECTED)"
              mismatch=1
            fi
          done
          [ $mismatch -eq 0 ]

      - name: Check if tag already exists on origin
        id: check
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -e
          if git ls-remote --tags --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build artifacts
        if: steps.check.outputs.skip == 'false'
        env:
          NAME: ${{ steps.version.outputs.name }}
        run: |
          set -e
          mkdir -p dist
          npx --yes @anthropic-ai/mcpb pack desktop "dist/${NAME}.mcpb"
          tar --exclude='./dist' --exclude='./.git' -czf "dist/${NAME}.tar.gz" \
            .claude-plugin .cursor-plugin .codex-plugin .agents \
            .mcp.json mcp_config.json plugin.json \
            assets cursor desktop opencode skills \
            README.md CHANGELOG.md LICENSE SECURITY.md
          (cd dist && sha256sum "${NAME}.mcpb" "${NAME}.tar.gz" > "${NAME}-checksums.txt")

      - name: Create and push tag
        if: steps.check.outputs.skip == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        if: steps.check.outputs.skip == 'false'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            dist/*.mcpb
            dist/*.tar.gz
            dist/*-checksums.txt
          generate_release_notes: true
          body: |
            ## Verification

            Each release ships a `princi-<version>-checksums.txt` file with SHA256 hashes for every artifact. Verify before installing:

            ```bash
            sha256sum -c princi-<version>-checksums.txt
            ```
