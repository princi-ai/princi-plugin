name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Build artifacts
        run: |
          set -e
          VERSION="${GITHUB_REF_NAME}"
          NAME="princi-${VERSION}"

          mkdir -p dist
          npx --yes @anthropic-ai/mcpb pack desktop "dist/${NAME}.mcpb"
          tar --exclude='./dist' --exclude='./.git' -czf "dist/${NAME}.tar.gz" \
            .claude-plugin .cursor-plugin .mcp.json assets cursor desktop skills \
            README.md CHANGELOG.md LICENSE SECURITY.md
          (cd dist && sha256sum "${NAME}.mcpb" "${NAME}.tar.gz" > "${NAME}-checksums.txt")

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.mcpb
            dist/*.tar.gz
            dist/*-checksums.txt
          generate_release_notes: true
          body: |
            ## Verification

            Each release ships a `princi-<version>-checksums.txt` file with SHA256 hashes for every artifact. Verify before installing:

            ```bash
            sha256sum -c princi-<version>-checksums.txt
            ```
